<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Front Desk AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14213D;
    --brass: #B08D57;
    --brass-dark: #93733F;
    --paper: #FAF7F2;
    --slate: #6B7280;
    --available: #3E7C59;
    --line: #E6E1D8;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #EDEAE2;
    margin: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  #widget {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 780px;
    margin: auto;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(20, 33, 61, 0.18);
    border-radius: 18px;
    overflow: hidden;
  }

  #header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 22px 18px;
    position: relative;
  }

  #agency-name {
    font-family: 'Fraunces', serif;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin: 0;
  }

  #agency-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 12.5px;
    color: #C7CDDB;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--available);
    box-shadow: 0 0 0 3px rgba(62, 124, 89, 0.25);
  }

  #messages {
    flex: 1;
    padding: 20px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background:
      radial-gradient(circle at 100% 0%, rgba(176, 141, 87, 0.06), transparent 40%),
      var(--paper);
  }

  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.bot { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    font-size: 14.5px;
    line-height: 1.5;
    animation: rise 0.25s ease-out;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot .bubble {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
    border-left: 3px solid var(--brass);
    border-radius: 4px 14px 14px 14px;
  }

  .user .bubble {
    background: var(--ink);
    color: var(--paper);
    border-radius: 14px 4px 14px 14px;
  }

  .typing-row { display: flex; align-items: center; gap: 8px; padding: 4px 4px; }
  .key-icon {
    width: 16px;
    height: 16px;
    color: var(--brass-dark);
    animation: turn-key 1.1s ease-in-out infinite;
    transform-origin: 65% 50%;
  }
  @keyframes turn-key {
    0%, 100% { transform: rotate(-18deg); }
    50% { transform: rotate(18deg); }
  }
  .typing-label { font-size: 12.5px; color: var(--slate); }

  #input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: #fff;
    border-top: 1px solid var(--line);
  }

  #userInput {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 999px;
    padding: 11px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
  }

  #userInput:focus {
    border-color: var(--brass);
    box-shadow: 0 0 0 3px rgba(176, 141, 87, 0.15);
  }

  #sendBtn {
    width: 42px;
    height: 42px;
    min-width: 42px;
    border: none;
    border-radius: 50%;
    background: var(--brass);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #sendBtn:hover { background: var(--brass-dark); }
  #sendBtn:active { transform: scale(0.94); }

  #credit {
    text-align: center;
    font-size: 10.5px;
    letter-spacing: 0.3px;
    color: var(--slate);
    padding: 8px 0 12px;
    background: #fff;
  }
  #credit b { color: var(--ink); font-weight: 600; }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>

<div id="widget">

  <div id="header">
    <p id="agency-name">Sunrise Realty</p>
    <div id="agency-sub">
      <span class="live-dot"></span>
      <span>Front desk assistant &middot; usually replies instantly</span>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-bar">
    <input id="userInput" type="text" placeholder="Ask about a property..." />
    <button id="sendBtn" onclick="sendMessage()" aria-label="Send message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 12L20 4L14 20L11 13L4 12Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div id="credit">⚡ Powered by <b>Front Desk AI</b></div>

</div>

<script>
  const AGENCY_NAME = "Sunrise Realty";
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbz1TS1soQaLD4j9J7XRpdchiQwsNe0IV7eSzKvZHJhwr-U09HAfjDI4Ky1_Vw5I5bT5/exec";

  document.getElementById('agency-name').textContent = AGENCY_NAME;

  const sessionId = "sess_" + Math.random().toString(36).substring(2, 12);
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("userInput");

  function addMessage(text, sender) {
    const row = document.createElement("div");
    row.className = "row " + sender;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTypingIndicator() {
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = `
      <div class="bubble typing-row">
        <svg class="key-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="8" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M12 12H21M17 12V16M21 12V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="typing-label">Checking listings...</span>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, "user");
    inputEl.value = "";

    const typingRow = addTypingIndicator();

    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        body: JSON.stringify({ sessionId, message: text })
      });
      const data = await res.json();
      typingRow.remove();
      addMessage(data.reply, "bot");
    } catch (err) {
      typingRow.remove();
      addMessage("Sorry, something went wrong. Please try again in a moment.", "bot");
    }
  }

  inputEl.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  addMessage(`Hi! 👋 Welcome to ${AGENCY_NAME}. Tell me what kind of property you're looking for and I'll help you book a viewing.`, "bot");
</script>

</body>
</html>
